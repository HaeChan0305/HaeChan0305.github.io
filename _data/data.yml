career-profile:
    title: About Me
    summary: |  
      I am a Ph.D. candidate at <a href="https://mli.kaist.ac.kr/" target="_blank">Machine Learning and Intelligence Lab</a> (MLILAB) in Korea Advanced Institute of Science and Technology (KAIST), advised by Prof.<a href="https://scholar.google.com/citations?user=UWO1mloAAAAJ&hl=ko&oi=ao" target="_blank">Eunho Yang</a>.

      My research broadly focuses on large language models, with particular interests in reinforcement learning with verifiable rewards and agentic reinforcement learning.



